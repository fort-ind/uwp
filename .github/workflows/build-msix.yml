name: Build MSIX Package

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    
    strategy:
      fail-fast: false
      matrix:
        platform: [x86, x64]
        configuration: [Release]

    env:
      Solution_Name: Fort.ind UWP.sln
      Project_Path: Fort.ind UWP\Fort.ind UWP.vbproj
      Manifest_Path: Fort.ind UWP\Package.appxmanifest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4

    - name: Resolve Visual Studio MSBuild path
      id: msbuild
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vswhere)) {
          throw "vswhere.exe not found at expected path: $vswhere"
        }

        $msbuildPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
        if ([string]::IsNullOrWhiteSpace($msbuildPath)) {
          throw "Could not locate Visual Studio MSBuild.exe via vswhere"
        }

        Write-Host "Using MSBuild: $msbuildPath"
        "msbuild_path=$msbuildPath" >> $env:GITHUB_OUTPUT

    - name: Restore solution
      shell: pwsh
      run: |
        & "${{ steps.msbuild.outputs.msbuild_path }}" "${{ env.Solution_Name }}" `
          /t:Restore `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:VisualStudioVersion=17.0 `
          /nologo

    - name: Update manifest version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -match "refs/tags/v(.+)") {
          $version = $matches[1]
          $parts = $version.Split('.')
          while ($parts.Count -lt 4) { $parts += "0" }
          $version = $parts[0..3] -join '.'
        } else {
          $version = "1.0.${{ github.run_number }}.0"
        }
        Write-Host "Setting version to: $version"
        $manifestPath = "${{ env.Manifest_Path }}"
        [xml]$manifest = Get-Content $manifestPath
        $manifest.Package.Identity.Version = $version
        $manifest.Save($manifestPath)
        "APP_VERSION=$version" >> $env:GITHUB_ENV
        "app_version=$version" >> $env:GITHUB_OUTPUT

    - name: Decode signing certificate
      id: cert
      shell: pwsh
      env:
        SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE }}
        CERT_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      run: |
        if ("${{ github.event_name }}" -eq "pull_request") {
          Write-Host "Pull request build: skipping certificate decode"
          "HAS_CERTIFICATE=false" >> $env:GITHUB_ENV
          "has_certificate=false" >> $env:GITHUB_OUTPUT
          exit 0
        }

        if ([string]::IsNullOrEmpty($env:SIGNING_CERT)) {
          Write-Host "No signing certificate found, will build unsigned"
          "HAS_CERTIFICATE=false" >> $env:GITHUB_ENV
          "has_certificate=false" >> $env:GITHUB_OUTPUT
          exit 0
        }

        $pfxPath = "Fort.ind UWP\Fort.ind UWP_TemporaryKey.pfx"
        $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT)
        [IO.File]::WriteAllBytes($pfxPath, $certBytes)

        $cerPath = "Fort.ind UWP\Fort.ind_UWP.cer"
        try {
          if (-not [string]::IsNullOrWhiteSpace($env:CERT_PASSWORD)) {
            $x509 = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
              (Resolve-Path $pfxPath).Path,
              $env:CERT_PASSWORD,
              [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable
            )
            [IO.File]::WriteAllBytes($cerPath, $x509.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
            Write-Host "Exported public certificate to: $cerPath"
          } else {
            Write-Host "CERT_PASSWORD is empty; skipping CER export"
          }

          "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
          "CER_PATH=$cerPath" >> $env:GITHUB_ENV
          "HAS_CERTIFICATE=true" >> $env:GITHUB_ENV
          "has_certificate=true" >> $env:GITHUB_OUTPUT
        } catch {
          Write-Warning "Certificate processing failed, building unsigned instead. Error: $($_.Exception.Message)"
          "HAS_CERTIFICATE=false" >> $env:GITHUB_ENV
          "has_certificate=false" >> $env:GITHUB_OUTPUT
        }

    - name: Build MSIX Package (Signed)
      if: steps.cert.outputs.has_certificate == 'true'
      shell: pwsh
      env:
        CERT_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
      run: |
        & "${{ steps.msbuild.outputs.msbuild_path }}" "${{ env.Project_Path }}" `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:VisualStudioVersion=17.0 `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxBundle=Never `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateKeyFile="Fort.ind UWP_TemporaryKey.pfx" `
          /p:PackageCertificatePassword="$env:CERT_PASSWORD" `
          /p:GenerateAppxPackageOnBuild=true `
          /restore

    - name: Build MSIX Package (Unsigned)
      if: steps.cert.outputs.has_certificate != 'true'
      shell: pwsh
      run: |
        & "${{ steps.msbuild.outputs.msbuild_path }}" "${{ env.Project_Path }}" `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:VisualStudioVersion=17.0 `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxBundle=Never `
          /p:AppxPackageSigningEnabled=false `
          /p:GenerateAppxPackageOnBuild=true `
          /restore

    - name: Copy Install Script and Certificate to Package
      shell: pwsh
      run: |
        $packageDir = Get-ChildItem -Path "Fort.ind UWP\AppPackages" -Directory | Select-Object -First 1
        if ($packageDir) {
          # Copy the installer script
          Copy-Item "scripts\Install.ps1" -Destination "$($packageDir.FullName)\Install.ps1"
          Write-Host "Copied Install.ps1 to package directory"
          
          # Copy certificate if it exists
          if (Test-Path "Fort.ind UWP\Fort.ind_UWP.cer") {
            Copy-Item "Fort.ind UWP\Fort.ind_UWP.cer" -Destination "$($packageDir.FullName)\Fort.ind_UWP.cer"
            Write-Host "Copied certificate to package directory"
          }
        }

    - name: Upload MSIX Package
      uses: actions/upload-artifact@v7
      with:
        name: MSIX-${{ matrix.platform }}-${{ matrix.configuration }}-v${{ steps.version.outputs.app_version }}
        path: |
          Fort.ind UWP\AppPackages\**\*.msix
          Fort.ind UWP\AppPackages\**\*.appx
          Fort.ind UWP\AppPackages\**\*.cer
          Fort.ind UWP\AppPackages\**\Install.ps1
        if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
